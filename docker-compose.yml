# docker-compose.yml - Replace environment section
version: '3.8'
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: attendance_db      # ← Your DB name
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: QWERTY       # ← Your password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:QWERTY@db:5432/attendance_db  # ← Your creds

volumes:
  postgres_data: